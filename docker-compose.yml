services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9095:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      HTTP_PORT: "8080"
      ENABLE_HTTPS: "false"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 50M
          cpus: "0.05"

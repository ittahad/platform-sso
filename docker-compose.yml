services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:9095:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      HTTP_PORT: "8080"
      ENABLE_HTTPS: "false"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped